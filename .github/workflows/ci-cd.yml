name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ruff

      - name: Run Ruff linter
        run: ruff check app/ tests/

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    services:
      mailhog:
        image: mailhog/mailhog:latest
        ports:
          - 1025:1025
          - 8025:8025
      moto:
        image: motoserver/moto:latest
        ports:
          - 5000:5000
      redis:
        image: redis:latest
        ports:
          - 6379:6379

    env:
      # Test environment variables (SQLite, no external services)
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: testpassword
      DB_NAME: test_db
      REDIS_HOST: localhost
      REDIS_PORT: "6379"
      REDIS_NAME: "0"
      APP_PREFIX: lms
      CACHE_VERSION: v1
      JWT_SECRET_KEY: test-secret-key
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRY_IN_MINUTES: "30"
      JWT_REFRESH_TOKEN_EXPIRY_IN_MINUTES: "10080"
      LOG_LEVEL: WARNING
      ENABLE_FILE_LOGGING: "false"
      ENABLE_REQUEST_LOGGING: "false"
      ENVIRONMENT: testing

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Run tests with coverage
        run: pytest tests/ --cov=app --cov-report=term-missing --cov-fail-under=50

  docker:
    name: Docker Build and Push
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/lms-be:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/lms-be:${{ github.sha }}

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Copy docker-compose.prod.yml to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "docker-compose.prod.yml"
          target: "/opt/apps/lms_be_prod/"

      - name: Execute deployment script
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            mkdir -p /opt/apps/lms_be_prod
            cd /opt/apps/lms_be_prod

            # Create .env
            cat << 'EOF' > .env
            ${{ secrets.PROD_ENV_FILE }}
            EOF

            echo "Deployment directory:"
            pwd
            ls -la

            # Verify Docker Compose
            docker compose version

            # Current image (for rollback)
            CURRENT_IMAGE=$(docker ps --filter "name=lms_be_app" --format "{{.Image}}")
            echo "Current image: $CURRENT_IMAGE"

            # New image
            NEW_IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/lms-be:${{ github.sha }}"
            echo "Pulling $NEW_IMAGE"

            docker pull $NEW_IMAGE

            export DOCKER_IMAGE=$NEW_IMAGE
            export API_DOMAIN="${{ secrets.API_DOMAIN }}"

            echo "Starting containers..."
            docker compose -f docker-compose.prod.yml up -d

            echo "Waiting for health check..."
            sleep 20

            HEALTH_STATUS=""

            for i in {1..12}; do
              HEALTH_STATUS=$(docker inspect --format='{{json .State.Health.Status}}' lms_be_app 2>/dev/null || echo '"unknown"')

              if [ "$HEALTH_STATUS" = '"healthy"' ]; then
                echo "Container is healthy!"
                exit 0
              fi

              echo "Health status: $HEALTH_STATUS"
              sleep 5
            done

            echo "Health check failed."

            if [ -n "$CURRENT_IMAGE" ]; then
              echo "Rolling back to $CURRENT_IMAGE"

              export DOCKER_IMAGE=$CURRENT_IMAGE
              docker compose -f docker-compose.prod.yml up -d
            else
              docker compose -f docker-compose.prod.yml down
            fi

            exit 1